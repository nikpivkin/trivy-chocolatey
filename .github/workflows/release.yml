name: Build and Push Chocolatey Package
# Start
on:
  workflow_dispatch: # Allows manual triggering
    inputs:
      version:
        description: 'The version to update to (leave empty to auto-detect latest)'
        required: false
        default: ''

permissions: {}

jobs:
  # run the update script on ubuntu and push the changes to main branch
  update:
    runs-on: ubuntu-2404-2core
    permissions: {}
    steps:
      # Use a GitHub App token because GITHUB_TOKEN cannot bypass repository rules on push
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.REPO_TRIVY_TELEMETRY_WRITE_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_TRIVY_TELEMETRY_WRITE_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set Trivy version from input
        id: set_version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Remove "v" prefix if present
          incoming_version="${INPUT_VERSION}"
          echo "version=${incoming_version#v}" >> $GITHUB_OUTPUT

      - name: Run update script
        env:
          TRIVY_VERSION: ${{ steps.set_version.outputs.version }}
        run: |
          ./scripts/update.sh "$TRIVY_VERSION"

      - name: Commit and push changes
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          git add trivy.nuspec tools/chocolateyinstall.ps1
          git commit -m "Update package to latest version" || echo "No changes to commit"
          git push origin "HEAD:${GIT_REF_NAME}"

    # on windows latest, build and push the package to chocolatey.org and myget.org
  build-and-push:
    runs-on: windows-latest
    permissions:
      contents: read # Required for actions/checkout
    needs: update
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: pack the project
        run: |
          choco apikey -k ${env:CHOCO_API_KEY} -s https://push.chocolatey.org/
          choco pack
          choco push -s https://push.chocolatey.org/
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
